<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Partner</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        margin:0;
        padding:0;
        text-align:center;
    }

    header{
        background:#2196F3;
        color:white;
        padding:20px;
    }

    .container{
        width:80%;
        max-width:600px;
        margin:30px auto;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    input{
        width:90%;
        padding:10px;
        margin:10px;
        border:1px solid #ccc;
        border-radius:5px;
    }

    button{
        background:#4CAF50;
        color:white;
        border:none;
        padding:12px 20px;
        border-radius:5px;
        cursor:pointer;
        font-size:16px;
    }

    button:hover{
        background:#45a049;
    }

    #partnerCard{
        margin-top:20px;
        padding:15px;
        border:2px solid #2196F3;
        border-radius:10px;
        display:none;
    }
</style>
</head>

<body>

<header>
    <h1>🏃 Running Partner</h1>
    <p>Find a Morning Running Buddy</p>
</header>

<div class="container">

    <h2>Enter Your Details</h2>

    <input type="text" id="name" placeholder="Your Name">

    <input type="text" id="location" placeholder="Your Location">

    <button onclick="findPartner()">
        Find Running Partner
    </button>

    <div id="partnerCard">
        <h3>🎉 Partner Found!</h3>
        <p id="partnerInfo"></p>
    </div>

</div>

<script>

function findPartner(){

    const partners = [
        "Rahul - 5 km Runner",
        "Ananya - Marathon Enthusiast",
        "Vikram - Fitness Lover",
        "Sneha - Morning Jogger",
        "Arjun - Daily Runner"
    ];

    let randomPartner =
        partners[Math.floor(Math.random() * partners.length)];

    document.getElementById("partnerInfo").innerHTML =
        randomPartner;

    document.getElementById("partnerCard").style.display = "block";
}

</script>

</body>
</html>
